name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build
        run: xcodebuild clean build -project AuthenticateMe.xcodeproj -scheme AuthenticateMe -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Run tests
        run: xcodebuild test -project AuthenticateMe.xcodeproj -scheme AuthenticateMe -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: path/to/test/results
